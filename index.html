<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SnapAndWrap Magic Frame</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'DM Sans',sans-serif}

#splash{
  position:fixed;inset:0;background:#07070f;z-index:1000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem;transition:opacity .5s
}
#splash.hide{opacity:0;pointer-events:none}
.brand{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;
  background:linear-gradient(135deg,#7c5cfc,#fc5c7d);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.tagline{font-size:0.78rem;color:#6b6b82;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2rem}
.loader{width:42px;height:42px;border:3px solid #22223a;border-top-color:#7c5cfc;
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 1rem}
@keyframes spin{to{transform:rotate(360deg)}}
.load-text{font-size:0.85rem;color:#6b6b82}

#error-screen{
  position:fixed;inset:0;background:#07070f;z-index:999;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem;text-align:center;color:#f0f0f8
}
.err-icon{font-size:3rem;margin-bottom:1rem}
.err-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:8px}
.err-msg{font-size:0.88rem;color:#6b6b82;line-height:1.7;max-width:300px}

/* MindAR container */
#mindar-container{position:fixed;inset:0;z-index:1}

/* Hint overlay */
#scan-hint{
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  padding:2rem 1.5rem;text-align:center;
  background:linear-gradient(transparent,rgba(0,0,0,.75));
  pointer-events:none
}
.hint-pulse{
  width:56px;height:56px;border:2px solid rgba(124,92,252,.7);
  border-radius:50%;margin:0 auto 12px;
  animation:pulse 1.6s ease-out infinite
}
@keyframes pulse{0%{transform:scale(1);opacity:1}100%{transform:scale(1.6);opacity:0}}
.hint-text{font-size:0.9rem;color:rgba(255,255,255,.8);font-weight:500;margin-bottom:4px}
.hint-sub{font-size:0.75rem;color:rgba(255,255,255,.45)}

#corner-brand{
  position:fixed;top:1rem;left:1rem;z-index:50;
  font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;
  background:linear-gradient(135deg,#7c5cfc,#fc5c7d);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  pointer-events:none
}

#detected-banner{
  position:fixed;top:1rem;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,#7c5cfc,#fc5c7d);
  padding:7px 20px;border-radius:30px;font-size:0.82rem;font-weight:600;
  z-index:55;display:none;white-space:nowrap;color:#fff;
  box-shadow:0 4px 20px rgba(124,92,252,.5)
}
</style>
</head>
<body>

<div id="splash">
  <div class="brand">SnapAndWrap</div>
  <div class="tagline">Magic Video Frame</div>
  <div class="loader"></div>
  <div class="load-text" id="load-text">Loading your magic...</div>
</div>

<div id="error-screen">
  <div class="err-icon">😕</div>
  <div class="err-title" id="err-title">Something went wrong</div>
  <div class="err-msg" id="err-msg">Please try again.</div>
</div>

<div id="mindar-container"></div>
<div id="corner-brand" style="display:none">SnapAndWrap</div>
<div id="detected-banner">✨ Magic Frame detected!</div>
<div id="scan-hint" style="display:none">
  <div class="hint-pulse"></div>
  <div class="hint-text">Point camera at your photo frame</div>
  <div class="hint-sub">Keep the frame fully in view • Hold steady</div>
</div>

<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const params = new URLSearchParams(window.location.search);
const orderId = params.get('order');
let mindARInstance = null;

function setLoad(t){ document.getElementById('load-text').textContent = t; }
function showError(title, msg){
  document.getElementById('splash').style.display = 'none';
  const e = document.getElementById('error-screen');
  e.style.display = 'flex';
  document.getElementById('err-title').textContent = title;
  document.getElementById('err-msg').textContent = msg;
}

async function init(){
  if(!orderId){
    showError('Invalid Link','No order ID found. Please use the QR code from SnapAndWrap.');
    return;
  }
  setLoad('Finding your order...');
  try {
    const snap = await db.ref('orders/' + orderId).get();
    if(!snap.exists()){
      showError('Order Not Found','Order "'+orderId+'" not found. Contact SnapAndWrap on WhatsApp.');
      return;
    }
    const data = snap.val();
    db.ref('orders/'+orderId+'/scanCount').transaction(c=>(c||0)+1);

    if(!data.mindFileData){
      showError('AR Not Ready','The .mind tracking file for this order is not set up yet. Please contact SnapAndWrap.');
      return;
    }

    setLoad('Loading AR tracker...');
    await startMindAR(data.mindFileData, data.videoData);

  } catch(e){
    showError('Error', e.message);
    console.error(e);
  }
}

async function startMindAR(mindFileBase64, videoBase64){
  setLoad('Starting camera...');

  // Convert base64 .mind file to blob URL
  const mindBlob = base64ToBlob(mindFileBase64, 'application/octet-stream');
  const mindURL = URL.createObjectURL(mindBlob);

  // Convert video base64 to blob URL
  const videoBlob = base64ToBlob(videoBase64, 'video/mp4');
  const videoURL = URL.createObjectURL(videoBlob);

  // Build MindAR scene dynamically
  const container = document.getElementById('mindar-container');
  container.innerHTML = `
    <a-scene
      id="ar-scene"
      mindar-image="imageTargetSrc: ${mindURL}; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      style="position:fixed;inset:0;z-index:1"
    >
      <a-assets>
        <video id="ar-video" src="${videoURL}" preload="auto" loop crossorigin playsinline webkit-playsinline muted></video>
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane
          src="#ar-video"
          position="0 0 0"
          height="0.552"
          width="1"
          rotation="0 0 0"
          material="shader: flat; src: #ar-video"
        ></a-plane>
      </a-entity>
    </a-scene>
  `;

  // Load A-Frame after setting up scene
  const aframeScript = document.createElement('script');
  aframeScript.src = 'https://aframe.io/releases/1.4.0/aframe.min.js';
  document.head.appendChild(aframeScript);

  aframeScript.onload = () => {
    const mindScript = document.createElement('script');
    mindScript.src = 'https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js';
    document.head.appendChild(mindScript);

    mindScript.onload = () => {
      setLoad('Almost ready...');
      setTimeout(() => {
        document.getElementById('splash').classList.add('hide');
        setTimeout(() => {
          document.getElementById('splash').style.display = 'none';
          document.getElementById('scan-hint').style.display = 'block';
          document.getElementById('corner-brand').style.display = 'block';
        }, 500);

        // Watch for target found/lost
        const scene = document.getElementById('ar-scene');
        scene.addEventListener('targetFound', () => {
          document.getElementById('scan-hint').style.opacity = '0';
          const banner = document.getElementById('detected-banner');
          banner.style.display = 'block';
          setTimeout(() => { banner.style.display = 'none'; }, 2000);
          const vid = document.getElementById('ar-video');
          if(vid){ vid.muted = false; vid.play(); }
        });
        scene.addEventListener('targetLost', () => {
          document.getElementById('scan-hint').style.opacity = '1';
          const vid = document.getElementById('ar-video');
          if(vid) vid.pause();
        });
      }, 1000);
    };
  };
}

function base64ToBlob(base64, mimeType){
  const parts = base64.split(';base64,');
  const raw = parts.length > 1 ? parts[1] : parts[0];
  const binary = atob(raw);
  const bytes = new Uint8Array(binary.length);
  for(let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new Blob([bytes], {type: mimeType});
}

init();
</script>
</body>
</html>
