<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* User Interaction Overlay to bypass Audio Block */
    #start-overlay {
      position: fixed;
      inset: 0;
      background: #0a0a0f;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: sans-serif;
    }
    .start-btn {
      padding: 15px 30px;
      font-size: 1.2rem;
      font-weight: bold;
      background: linear-gradient(135deg, #7c5cfc, #fc5c7d);
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(124,92,252,.3);
    }
  </style>

  <script>
    // 1. THE OBJECT-FIT: COVER COMPONENT
    // This dynamically crops the video to perfectly fill the tracking image area
    AFRAME.registerComponent('video-cover', {
      schema: {
        // Replace these with the actual width/height ratio of your target photo
        // E.g., if your photo is 1080x1080, width:1, height:1
        // If your photo is portrait 1080x1920, width:1, height:1.77
        targetWidth: {type: 'number', default: 1}, 
        targetHeight: {type: 'number', default: 1} 
      },
      init: function () {
        this.videoEl = document.querySelector(this.el.getAttribute('src'));

        const applyCover = () => {
          if (!this.videoEl.videoWidth) return; // Wait until video metadata loads

          const mesh = this.el.getObject3D('mesh');
          if (!mesh || !mesh.material.map) return;

          const tex = mesh.material.map;

          const vW = this.videoEl.videoWidth;
          const vH = this.videoEl.videoHeight;
          const tW = this.data.targetWidth;
          const tH = this.data.targetHeight;

          const vRatio = vW / vH;
          const tRatio = tW / tH;

          // Crop texture properly without distorting
          if (vRatio > tRatio) {
             // Video is wider than target -> Crop sides
             const scaleU = tRatio / vRatio;
             tex.repeat.set(scaleU, 1);
             tex.offset.set((1 - scaleU) / 2, 0);
          } else {
             // Video is taller than target -> Crop top/bottom
             const scaleV = vRatio / tRatio;
             tex.repeat.set(1, scaleV);
             tex.offset.set(0, (1 - scaleV) / 2);
          }
        };

        // Apply when video metadata is loaded, and again when target is found
        this.videoEl.addEventListener('loadedmetadata', applyCover);
        this.el.sceneEl.addEventListener('targetFound', applyCover);
      }
    });

    // 2. TARGET PLAY/PAUSE LOGIC
    AFRAME.registerComponent('ar-controller', {
      init: function () {
        const target = this.el;
        const video = document.querySelector('#ar-video');

        // Play video when photo is scanned
        target.addEventListener('targetFound', () => {
          video.play();
        });

        // Pause video when photo is lost
        target.addEventListener('targetLost', () => {
          video.pause();
        });
      }
    });
  </script>
</head>
<body>

  <div id="start-overlay">
    <h2 style="margin-bottom: 20px;">Ready to Scan!</h2>
    <button class="start-btn" id="start-btn">Tap to Start AR</button>
  </div>

  <a-scene mindar-image="imageTargetSrc: YOUR_MIND_FILE.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <video id="ar-video" src="YOUR_VIDEO_URL.mp4" preload="auto" loop crossorigin="anonymous" playsinline></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" ar-controller>
      
      <a-plane src="#ar-video" position="0 0 0" width="1" height="1" video-cover="targetWidth: 1; targetHeight: 1" material="transparent: true"></a-plane>
      
    </a-entity>

  </a-scene>

  <script>
    // 3. UNLOCK AUDIO ON TAP
    document.getElementById('start-btn').addEventListener('click', function() {
      const video = document.getElementById('ar-video');
      
      // Unmute and force a quick play/pause to satisfy the browser's media engine
      video.muted = false; 
      video.play().then(() => {
        video.pause(); // Pause immediately until the tracker is actually found
      }).catch((e) => console.log("Playback error: ", e));
      
      // Hide the overlay and let MindAR take over
      document.getElementById('start-overlay').style.display = 'none';
    });
  </script>
</body>
</html>
