<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapAndWrap Admin</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0a0f;
    --surface:#13131a;
    --surface2:#1c1c26;
    --border:#2a2a38;
    --accent:#7c5cfc;
    --accent2:#fc5c7d;
    --text:#f0f0f8;
    --muted:#6b6b82;
    --success:#22c55e;
    --warn:#f59e0b;
  }
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
  header{
    padding:1.2rem 2rem;
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    background:var(--surface);
  }
  .logo{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .logo span{font-size:0.75rem;font-family:'DM Sans',sans-serif;font-weight:400;
    -webkit-text-fill-color:var(--muted);display:block;margin-top:-4px}
  .stats{display:flex;gap:1.5rem}
  .stat{text-align:right}
  .stat-num{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent)}
  .stat-label{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}

  .container{max-width:1100px;margin:0 auto;padding:2rem}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
  @media(max-width:700px){.grid{grid-template-columns:1fr}}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem}
  .card-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:1.2rem;
    display:flex;align-items:center;gap:8px}
  .card-title::before{content:'';width:4px;height:18px;background:linear-gradient(var(--accent),var(--accent2));border-radius:2px}

  label{display:block;font-size:0.8rem;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
  input[type=text],input[type=tel],select{
    width:100%;padding:10px 14px;background:var(--surface2);
    border:1px solid var(--border);border-radius:10px;color:var(--text);
    font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;
    transition:border-color .2s;margin-bottom:1rem
  }
  input:focus,select:focus{border-color:var(--accent)}
  .field{margin-bottom:0.2rem}

  .upload-box{
    border:2px dashed var(--border);border-radius:12px;padding:1.5rem;
    text-align:center;cursor:pointer;transition:all .2s;margin-bottom:1rem;
    background:var(--surface2);position:relative;overflow:hidden
  }
  .upload-box:hover{border-color:var(--accent);background:#1a1a28}
  .upload-box input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .upload-icon{font-size:2rem;margin-bottom:8px}
  .upload-label{font-size:0.85rem;color:var(--muted)}
  .upload-name{font-size:0.8rem;color:var(--accent);margin-top:6px;font-weight:500}

  .btn{
    width:100%;padding:12px;border:none;border-radius:12px;
    font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;
    cursor:pointer;transition:all .2s;letter-spacing:.03em
  }
  .btn-primary{
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;
  }
  .btn-primary:hover{opacity:.9;transform:translateY(-1px)}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}

  .progress{height:4px;background:var(--surface2);border-radius:2px;margin:12px 0;overflow:hidden;display:none}
  .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width .3s;border-radius:2px}

  .status{padding:10px 14px;border-radius:10px;font-size:0.85rem;margin-top:10px;display:none}
  .status.success{background:#052e16;color:var(--success);border:1px solid #166534}
  .status.error{background:#2d0a0a;color:#f87171;border:1px solid #7f1d1d}
  .status.loading{background:#1a1228;color:var(--accent);border:1px solid #3b1f6e}

  .orders-table{width:100%;border-collapse:collapse;font-size:0.85rem}
  .orders-table th{
    padding:10px 14px;text-align:left;color:var(--muted);
    font-size:0.75rem;text-transform:uppercase;letter-spacing:.05em;
    border-bottom:1px solid var(--border);font-weight:500
  }
  .orders-table td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
  .orders-table tr:hover td{background:var(--surface2)}
  .orders-table tr:last-child td{border-bottom:none}

  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:600}
  .badge-active{background:#052e16;color:var(--success)}
  .badge-new{background:#1a1228;color:var(--accent)}

  .qr-btn{
    padding:5px 12px;border-radius:8px;border:1px solid var(--accent);
    background:transparent;color:var(--accent);font-size:0.78rem;
    cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s
  }
  .qr-btn:hover{background:var(--accent);color:#fff}

  .modal{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);
    z-index:100;align-items:center;justify-content:center
  }
  .modal.open{display:flex}
  .modal-box{
    background:var(--surface);border:1px solid var(--border);
    border-radius:20px;padding:2rem;text-align:center;max-width:320px;width:90%
  }
  .modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;margin-bottom:0.4rem}
  .modal-sub{font-size:0.8rem;color:var(--muted);margin-bottom:1.2rem}
  #qr-canvas{margin:0 auto 1rem;background:#fff;padding:12px;border-radius:12px}
  .modal-close{
    padding:8px 20px;border-radius:10px;border:1px solid var(--border);
    background:transparent;color:var(--muted);cursor:pointer;
    font-family:'DM Sans',sans-serif;font-size:0.85rem;margin-top:8px
  }
  .modal-close:hover{background:var(--surface2)}
  .copy-link{
    font-size:0.72rem;color:var(--accent);word-break:break-all;
    background:var(--surface2);padding:8px 12px;border-radius:8px;
    margin-bottom:10px;cursor:pointer;border:1px solid var(--border)
  }
  .copy-link:hover{border-color:var(--accent)}

  .empty{text-align:center;padding:3rem;color:var(--muted);font-size:0.9rem}
  .scan-count{display:inline-flex;align-items:center;gap:4px;font-size:0.8rem;color:var(--muted)}
  .del-btn{
    padding:4px 10px;border-radius:8px;border:1px solid #7f1d1d;
    background:transparent;color:#f87171;font-size:0.75rem;
    cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;margin-left:4px
  }
  .del-btn:hover{background:#2d0a0a}
</style>
</head>
<body>

<header>
  <div class="logo">SnapAndWrap <span>Admin Dashboard</span></div>
  <div class="stats">
    <div class="stat"><div class="stat-num" id="total-orders">0</div><div class="stat-label">Orders</div></div>
    <div class="stat"><div class="stat-num" id="total-scans">0</div><div class="stat-label">Total Scans</div></div>
  </div>
</header>

<div class="container">
  <div class="grid">

    <!-- ADD ORDER FORM -->
    <div class="card">
      <div class="card-title">Add New Order</div>

      <div class="field">
        <label>Customer Name</label>
        <input type="text" id="cust-name" placeholder="e.g. Priya Sharma">
      </div>
      <div class="field">
        <label>Phone Number</label>
        <input type="tel" id="cust-phone" placeholder="e.g. 9876543210">
      </div>
      <div class="field">
        <label>Order ID</label>
        <input type="text" id="order-id" placeholder="Auto-generated" readonly style="color:var(--muted)">
      </div>

      <label>Frame Photo (the physical frame image)</label>
      <div class="upload-box" id="frame-box">
        <input type="file" id="frame-file" accept="image/*" onchange="handleFrameSelect(this)">
        <div class="upload-icon">🖼️</div>
        <div class="upload-label">Click to upload frame photo</div>
        <div class="upload-name" id="frame-name"></div>
      </div>

      <label>Customer Video</label>
      <div class="upload-box" id="video-box">
        <input type="file" id="video-file" accept="video/*" onchange="handleVideoSelect(this)">
        <div class="upload-icon">🎬</div>
        <div class="upload-label">Click to upload video (MP4 recommended)</div>
        <div class="upload-name" id="video-name"></div>
      </div>

      <div class="progress" id="progress-bar">
        <div class="progress-bar" id="progress-fill"></div>
      </div>

      <button class="btn btn-primary" id="submit-btn" onclick="submitOrder()">Add Order & Generate QR</button>
      <div class="status" id="status-msg"></div>
    </div>

    <!-- ORDERS LIST -->
    <div class="card" style="overflow:auto">
      <div class="card-title">All Orders</div>
      <div id="orders-container">
        <div class="empty">No orders yet. Add your first order!</div>
      </div>
    </div>

  </div>
</div>

<!-- QR MODAL -->
<div class="modal" id="qr-modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-customer">Customer QR</div>
    <div class="modal-sub" id="modal-orderid">Order ID</div>
    <div id="qr-canvas"></div>
    <div class="copy-link" id="modal-link" onclick="copyLink()">Click to copy link</div>
    <div style="font-size:0.75rem;color:var(--muted);margin-bottom:12px">Screenshot or right-click QR to save → send via WhatsApp</div>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let frameFile = null;
let videoFile = null;
let currentLink = '';

function generateOrderId(){
  const d = new Date();
  return 'ORD' + d.getFullYear().toString().slice(-2) +
    String(d.getMonth()+1).padStart(2,'0') +
    String(d.getDate()).padStart(2,'0') +
    String(d.getHours()).padStart(2,'0') +
    String(d.getMinutes()).padStart(2,'0') +
    String(Math.floor(Math.random()*100)).padStart(2,'0');
}

document.getElementById('order-id').value = generateOrderId();

function handleFrameSelect(input){
  frameFile = input.files[0];
  document.getElementById('frame-name').textContent = frameFile ? '✓ ' + frameFile.name : '';
}
function handleVideoSelect(input){
  videoFile = input.files[0];
  document.getElementById('video-name').textContent = videoFile ? '✓ ' + videoFile.name : '';
}

function showStatus(msg, type){
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = 'status ' + type;
  el.style.display = 'block';
}

function setProgress(pct){
  const bar = document.getElementById('progress-bar');
  bar.style.display = 'block';
  document.getElementById('progress-fill').style.width = pct + '%';
}

async function uploadToImgBB(file){
  const formData = new FormData();
  formData.append('image', file);
  const res = await fetch('https://api.imgbb.com/1/upload?key=' + IMGBB_API_KEY, {
    method:'POST', body:formData
  });
  const data = await res.json();
  if(!data.success) throw new Error('ImgBB upload failed');
  return data.data.url;
}

async function uploadVideoToDrive(file){
  // We store video in Firebase as base64 for small videos
  // For larger videos customer must upload to Google Drive manually
  // This returns a placeholder that admin can update
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.readAsDataURL(file);
  });
}

async function submitOrder(){
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();
  const orderId = document.getElementById('order-id').value.trim();

  if(!name){showStatus('Please enter customer name','error');return}
  if(!phone){showStatus('Please enter phone number','error');return}
  if(!frameFile){showStatus('Please upload frame photo','error');return}
  if(!videoFile){showStatus('Please upload video','error');return}

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  showStatus('Uploading frame image...','loading');
  setProgress(20);

  try {
    const frameURL = await uploadToImgBB(frameFile);
    setProgress(50);
    showStatus('Uploading video...','loading');

    const videoData = await uploadVideoToDrive(videoFile);
    setProgress(80);
    showStatus('Saving order...','loading');

    const orderData = {
      customerName: name,
      phone: phone,
      orderId: orderId,
      frameURL: frameURL,
      videoData: videoData,
      scanCount: 0,
      orderDate: new Date().toISOString(),
      status: 'active'
    };

    await db.ref('orders/' + orderId).set(orderData);
    setProgress(100);
    showStatus('Order added successfully!','success');

    const arLink = window.location.origin + window.location.pathname.replace('admin.html','') + 'index.html?order=' + orderId;
    showQRModal(name, orderId, arLink);

    document.getElementById('cust-name').value = '';
    document.getElementById('cust-phone').value = '';
    document.getElementById('frame-name').textContent = '';
    document.getElementById('video-name').textContent = '';
    document.getElementById('frame-file').value = '';
    document.getElementById('video-file').value = '';
    document.getElementById('order-id').value = generateOrderId();
    frameFile = null; videoFile = null;
    document.getElementById('progress-bar').style.display = 'none';

  } catch(e){
    showStatus('Error: ' + e.message, 'error');
    console.error(e);
  }
  btn.disabled = false;
}

function showQRModal(name, orderId, link){
  currentLink = link;
  document.getElementById('modal-customer').textContent = name;
  document.getElementById('modal-orderid').textContent = orderId;
  document.getElementById('modal-link').textContent = link;
  document.getElementById('qr-canvas').innerHTML = '';
  new QRCode(document.getElementById('qr-canvas'), {
    text: link, width:200, height:200,
    colorDark:'#000000', colorLight:'#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });
  document.getElementById('qr-modal').classList.add('open');
}

function closeModal(){ document.getElementById('qr-modal').classList.remove('open'); }

function copyLink(){
  navigator.clipboard.writeText(currentLink);
  document.getElementById('modal-link').textContent = '✓ Copied!';
  setTimeout(()=>{ document.getElementById('modal-link').textContent = currentLink; }, 2000);
}

function loadOrders(){
  db.ref('orders').on('value', snap => {
    const data = snap.val();
    const container = document.getElementById('orders-container');
    if(!data){
      container.innerHTML = '<div class="empty">No orders yet. Add your first order!</div>';
      document.getElementById('total-orders').textContent = '0';
      document.getElementById('total-scans').textContent = '0';
      return;
    }
    const orders = Object.values(data).reverse();
    document.getElementById('total-orders').textContent = orders.length;
    const totalScans = orders.reduce((s,o) => s + (o.scanCount||0), 0);
    document.getElementById('total-scans').textContent = totalScans;

    const baseURL = window.location.origin + window.location.pathname.replace('admin.html','') + 'index.html';

    let html = '<table class="orders-table"><thead><tr><th>Customer</th><th>Order ID</th><th>Scans</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
    orders.forEach(o => {
      const link = baseURL + '?order=' + o.orderId;
      html += `<tr>
        <td><div style="font-weight:500">${o.customerName}</div><div style="font-size:0.75rem;color:var(--muted)">${o.phone}</div></td>
        <td style="font-size:0.8rem;color:var(--muted);font-family:monospace">${o.orderId}</td>
        <td><span class="scan-count">👁 ${o.scanCount||0}</span></td>
        <td><span class="badge badge-active">Active</span></td>
        <td>
          <button class="qr-btn" onclick="showQRModal('${o.customerName}','${o.orderId}','${link}')">QR</button>
          <button class="del-btn" onclick="deleteOrder('${o.orderId}')">Del</button>
        </td>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  });
}

function deleteOrder(orderId){
  if(confirm('Delete order ' + orderId + '?')){
    db.ref('orders/' + orderId).remove();
  }
}

loadOrders();
</script>
</body>
</html>
