<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnapAndWrap Admin</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image.prod.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1c1c26;--border:#2a2a38;
  --accent:#7c5cfc;--accent2:#fc5c7d;--text:#f0f0f8;--muted:#6b6b82;
  --success:#22c55e;--warn:#f59e0b
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
header{padding:1.2rem 2rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.logo{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo span{font-size:0.72rem;font-family:'DM Sans',sans-serif;font-weight:400;
  -webkit-text-fill-color:var(--muted);display:block;margin-top:-4px}
.stats{display:flex;gap:1.5rem}
.stat-num{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;color:var(--accent);text-align:right}
.stat-label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}

.container{max-width:1100px;margin:0 auto;padding:2rem}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
@media(max-width:720px){.grid{grid-template-columns:1fr}}

.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem}
.card-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:1.2rem;
  display:flex;align-items:center;gap:8px}
.card-title::before{content:'';width:4px;height:18px;
  background:linear-gradient(var(--accent),var(--accent2));border-radius:2px}

label{display:block;font-size:0.78rem;color:var(--muted);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.04em}
input[type=text],input[type=tel]{
  width:100%;padding:10px 14px;background:var(--surface2);
  border:1px solid var(--border);border-radius:10px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;
  transition:border-color .2s;margin-bottom:1rem}
input:focus{border-color:var(--accent)}

.upload-box{
  border:2px dashed var(--border);border-radius:12px;padding:1.2rem;
  text-align:center;cursor:pointer;transition:all .2s;margin-bottom:1rem;
  background:var(--surface2);position:relative;overflow:hidden}
.upload-box:hover{border-color:var(--accent)}
.upload-box input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:1.8rem;margin-bottom:6px}
.upload-label{font-size:0.82rem;color:var(--muted)}
.upload-name{font-size:0.78rem;color:var(--accent);margin-top:5px;font-weight:500}

/* MIND COMPILE PROGRESS */
.compile-wrap{display:none;margin-bottom:1rem;
  background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1rem}
.compile-title{font-size:0.82rem;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.compile-bar-bg{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.compile-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));
  width:0%;transition:width .4s;border-radius:3px}
.compile-status{font-size:0.75rem;color:var(--muted);margin-top:6px}

.btn{width:100%;padding:12px;border:none;border-radius:12px;
  font-family:'Syne',sans-serif;font-size:0.95rem;font-weight:700;
  cursor:pointer;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none}

.status{padding:10px 14px;border-radius:10px;font-size:0.85rem;margin-top:10px;display:none}
.status.success{background:#052e16;color:var(--success);border:1px solid #166534}
.status.error{background:#2d0a0a;color:#f87171;border:1px solid #7f1d1d}
.status.loading{background:#1a1228;color:var(--accent);border:1px solid #3b1f6e}

.orders-table{width:100%;border-collapse:collapse;font-size:0.83rem}
.orders-table th{padding:9px 12px;text-align:left;color:var(--muted);
  font-size:0.72rem;text-transform:uppercase;letter-spacing:.05em;
  border-bottom:1px solid var(--border);font-weight:500}
.orders-table td{padding:11px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.orders-table tr:last-child td{border-bottom:none}
.orders-table tr:hover td{background:var(--surface2)}

.badge-active{display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:0.7rem;font-weight:600;background:#052e16;color:var(--success)}
.qr-btn{padding:5px 11px;border-radius:8px;border:1px solid var(--accent);
  background:transparent;color:var(--accent);font-size:0.75rem;cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .2s}
.qr-btn:hover{background:var(--accent);color:#fff}
.del-btn{padding:4px 9px;border-radius:8px;border:1px solid #7f1d1d;
  background:transparent;color:#f87171;font-size:0.72rem;cursor:pointer;
  font-family:'DM Sans',sans-serif;margin-left:4px}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:100;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:2rem;text-align:center;max-width:320px;width:90%}
.modal-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;margin-bottom:4px}
.modal-sub{font-size:0.78rem;color:var(--muted);margin-bottom:1.2rem}
#qr-canvas{margin:0 auto 1rem;background:#fff;padding:12px;border-radius:12px;display:inline-block}
.copy-link{font-size:0.7rem;color:var(--accent);word-break:break-all;
  background:var(--surface2);padding:7px 10px;border-radius:8px;
  margin-bottom:10px;cursor:pointer;border:1px solid var(--border);display:block}
.modal-close{padding:8px 20px;border-radius:10px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;
  font-family:'DM Sans',sans-serif;font-size:0.85rem;margin-top:6px}

.empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:0.88rem}
</style>
</head>
<body>
<header>
  <div class="logo">SnapAndWrap <span>Admin Dashboard</span></div>
  <div class="stats">
    <div><div class="stat-num" id="total-orders">0</div><div class="stat-label">Orders</div></div>
    <div><div class="stat-num" id="total-scans">0</div><div class="stat-label">Scans</div></div>
  </div>
</header>

<div class="container">
  <div class="grid">

    <div class="card">
      <div class="card-title">Add New Order</div>

      <label>Customer Name</label>
      <input type="text" id="cust-name" placeholder="e.g. Priya Sharma">

      <label>Phone Number</label>
      <input type="tel" id="cust-phone" placeholder="e.g. 9876543210">

      <label>Order ID</label>
      <input type="text" id="order-id" readonly style="color:var(--muted)">

      <label>Frame Photo (the physical frame image to scan)</label>
      <div class="upload-box">
        <input type="file" id="frame-file" accept="image/*" onchange="handleFrame(this)">
        <div class="upload-icon">🖼️</div>
        <div class="upload-label">Upload frame photo (JPG/PNG)</div>
        <div class="upload-name" id="frame-name"></div>
      </div>

      <label>Customer Video (MP4, max 30MB)</label>
      <div class="upload-box">
        <input type="file" id="video-file" accept="video/*" onchange="handleVideo(this)">
        <div class="upload-icon">🎬</div>
        <div class="upload-label">Upload video (MP4 recommended)</div>
        <div class="upload-name" id="video-name"></div>
      </div>

      <!-- MIND compile progress -->
      <div class="compile-wrap" id="compile-wrap">
        <div class="compile-title">⚙️ Generating AR tracker (.mind file)...</div>
        <div class="compile-bar-bg"><div class="compile-bar" id="compile-bar"></div></div>
        <div class="compile-status" id="compile-status">Preparing...</div>
      </div>

      <button class="btn btn-primary" id="submit-btn" onclick="submitOrder()">
        Add Order & Generate QR
      </button>
      <div class="status" id="status-msg"></div>
    </div>

    <div class="card" style="overflow:auto">
      <div class="card-title">All Orders</div>
      <div id="orders-container"><div class="empty">No orders yet.</div></div>
    </div>

  </div>
</div>

<!-- QR Modal -->
<div class="modal" id="qr-modal">
  <div class="modal-box">
    <div class="modal-title" id="modal-name">Customer</div>
    <div class="modal-sub" id="modal-oid">Order ID</div>
    <div id="qr-canvas"></div>
    <div class="copy-link" id="modal-link" onclick="copyLink()">Click to copy link</div>
    <div style="font-size:0.72rem;color:var(--muted);margin-bottom:10px">
      Screenshot QR → send via WhatsApp to customer
    </div>
    <button class="modal-close" onclick="document.getElementById('qr-modal').classList.remove('open')">Close</button>
  </div>
</div>

<script>
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let frameFile = null, videoFile = null, currentLink = '';

function genOrderId(){
  const d = new Date();
  return 'ORD' + d.getFullYear().toString().slice(-2) +
    String(d.getMonth()+1).padStart(2,'0') +
    String(d.getDate()).padStart(2,'0') +
    String(d.getHours()).padStart(2,'0') +
    String(d.getMinutes()).padStart(2,'0') +
    String(Math.floor(Math.random()*99)+1).padStart(2,'0');
}
document.getElementById('order-id').value = genOrderId();

function handleFrame(i){ frameFile = i.files[0]; document.getElementById('frame-name').textContent = frameFile ? '✓ '+frameFile.name : ''; }
function handleVideo(i){ videoFile = i.files[0]; document.getElementById('video-name').textContent = videoFile ? '✓ '+videoFile.name : ''; }

function showStatus(m,t){ const e=document.getElementById('status-msg'); e.textContent=m; e.className='status '+t; e.style.display='block'; }
function setCompile(pct,msg){ document.getElementById('compile-bar').style.width=pct+'%'; document.getElementById('compile-status').textContent=msg; }

function toBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=()=>rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}

async function uploadToImgBB(file){
  const fd = new FormData(); fd.append('image', file);
  const r = await fetch('https://api.imgbb.com/1/upload?key='+IMGBB_API_KEY,{method:'POST',body:fd});
  const d = await r.json();
  if(!d.success) throw new Error('ImgBB upload failed: '+JSON.stringify(d));
  return d.data.url;
}

async function compileMindFile(imageFile){
  return new Promise(async (resolve, reject) => {
    try {
      const img = new Image();
      const url = URL.createObjectURL(imageFile);
      img.onload = async () => {
        try {
          setCompile(20, 'Processing image...');
          const compiler = new MINDAR.IMAGE.Compiler();
          setCompile(40, 'Extracting features...');
          await compiler.compileImageTargets([img], (progress) => {
            setCompile(40 + Math.round(progress * 40), 'Compiling... ' + Math.round(progress*100) + '%');
          });
          setCompile(90, 'Finalizing .mind file...');
          const buffer = await compiler.exportData();
          const blob = new Blob([buffer]);
          const reader = new FileReader();
          reader.onload = () => { setCompile(100,'Done!'); resolve(reader.result); };
          reader.onerror = () => reject(new Error('Export failed'));
          reader.readAsDataURL(blob);
        } catch(e){ reject(e); }
      };
      img.onerror = () => reject(new Error('Image load failed'));
      img.src = url;
    } catch(e){ reject(e); }
  });
}

async function submitOrder(){
  const name = document.getElementById('cust-name').value.trim();
  const phone = document.getElementById('cust-phone').value.trim();
  const orderId = document.getElementById('order-id').value.trim();

  if(!name){ showStatus('Enter customer name','error'); return; }
  if(!phone){ showStatus('Enter phone number','error'); return; }
  if(!frameFile){ showStatus('Upload frame photo','error'); return; }
  if(!videoFile){ showStatus('Upload video','error'); return; }

  if(videoFile.size > 31457280){
    showStatus('Video too large! Please use a video under 30MB.','error'); return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;

  try {
    // Step 1: Upload frame to ImgBB
    showStatus('Uploading frame image...','loading');
    const frameURL = await uploadToImgBB(frameFile);

    // Step 2: Compile .mind file from frame image
    showStatus('Generating AR tracker (.mind file)...','loading');
    document.getElementById('compile-wrap').style.display = 'block';
    setCompile(10, 'Starting...');
    const mindFileData = await compileMindFile(frameFile);
    document.getElementById('compile-wrap').style.display = 'none';

    // Step 3: Convert video to base64
    showStatus('Processing video...','loading');
    const videoData = await toBase64(videoFile);

    // Step 4: Save to Firebase
    showStatus('Saving order...','loading');
    await db.ref('orders/' + orderId).set({
      customerName: name,
      phone: phone,
      orderId: orderId,
      frameURL: frameURL,
      mindFileData: mindFileData,
      videoData: videoData,
      scanCount: 0,
      orderDate: new Date().toISOString(),
      status: 'active'
    });

    showStatus('✅ Order added! AR tracker ready.','success');

    const arLink = window.location.origin +
      window.location.pathname.replace('admin.html','') +
      'index.html?order=' + orderId;
    showQR(name, orderId, arLink);

    // Reset form
    document.getElementById('cust-name').value='';
    document.getElementById('cust-phone').value='';
    document.getElementById('frame-name').textContent='';
    document.getElementById('video-name').textContent='';
    document.getElementById('frame-file').value='';
    document.getElementById('video-file').value='';
    document.getElementById('order-id').value = genOrderId();
    frameFile=null; videoFile=null;

  } catch(e){
    showStatus('Error: '+e.message,'error');
    console.error(e);
    document.getElementById('compile-wrap').style.display='none';
  }
  btn.disabled = false;
}

function showQR(name, oid, link){
  currentLink = link;
  document.getElementById('modal-name').textContent = name;
  document.getElementById('modal-oid').textContent = oid;
  document.getElementById('modal-link').textContent = link;
  document.getElementById('qr-canvas').innerHTML = '';
  new QRCode(document.getElementById('qr-canvas'),{
    text:link,width:200,height:200,
    colorDark:'#000',colorLight:'#fff',
    correctLevel:QRCode.CorrectLevel.H
  });
  document.getElementById('qr-modal').classList.add('open');
}

function copyLink(){
  navigator.clipboard.writeText(currentLink);
  document.getElementById('modal-link').textContent='✓ Copied!';
  setTimeout(()=>{ document.getElementById('modal-link').textContent=currentLink; },2000);
}

function loadOrders(){
  db.ref('orders').on('value', snap => {
    const data = snap.val();
    const c = document.getElementById('orders-container');
    if(!data){ c.innerHTML='<div class="empty">No orders yet.</div>';
      document.getElementById('total-orders').textContent='0';
      document.getElementById('total-scans').textContent='0'; return; }
    const orders = Object.values(data).reverse();
    document.getElementById('total-orders').textContent = orders.length;
    document.getElementById('total-scans').textContent = orders.reduce((s,o)=>s+(o.scanCount||0),0);
    const base = window.location.origin + window.location.pathname.replace('admin.html','') + 'index.html';
    let html = '<table class="orders-table"><thead><tr><th>Customer</th><th>Order</th><th>Scans</th><th>AR</th><th>Actions</th></tr></thead><tbody>';
    orders.forEach(o=>{
      const link = base+'?order='+o.orderId;
      const arReady = o.mindFileData ? '✅' : '❌';
      html+=`<tr>
        <td><div style="font-weight:500">${o.customerName}</div><div style="font-size:0.72rem;color:var(--muted)">${o.phone}</div></td>
        <td style="font-size:0.75rem;color:var(--muted);font-family:monospace">${o.orderId}</td>
        <td style="font-size:0.82rem">👁 ${o.scanCount||0}</td>
        <td style="font-size:1rem">${arReady}</td>
        <td>
          <button class="qr-btn" onclick="showQR('${o.customerName}','${o.orderId}','${link}')">QR</button>
          <button class="del-btn" onclick="if(confirm('Delete?'))db.ref('orders/${o.orderId}').remove()">Del</button>
        </td>
      </tr>`;
    });
    html+='</tbody></table>';
    c.innerHTML=html;
  });
}
loadOrders();
</script>
</body>
</html>
